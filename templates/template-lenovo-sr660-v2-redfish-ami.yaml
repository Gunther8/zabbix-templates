        type: DEPENDENT
        key: redfish.psu.status[{#PSU.NAME}]
        delay: '0'
        history: 7d
        trends: '0'
        value_type: TEXT
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.PowerSupplies[?(@.Name=='{#PSU.NAME}')].Status.Health.first()
        master_item:
          key: redfish.power.get
        tags:
        - tag: Component
          value: PSU
        trigger_prototypes:
        - uuid: a8f8aa6c26b247f698961c94e38ace99
          expression: last(/Template Lenovo SR660 V2 Redfish AMI/redfish.psu.status[{#PSU.NAME}])<>"OK"
          name: PSU [{#PSU.NAME}] health not OK on {HOST.NAME}
          priority: HIGH
      - uuid: 012acb1b332249778cd08fdc1f43d1d8
        name: 'PSU [{#PSU.NAME}]: Input Voltage'
        type: DEPENDENT
        key: redfish.psu.voltage[{#PSU.NAME}]
        delay: '0'
        history: 7d
        value_type: FLOAT
        units: V
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.PowerSupplies[?(@.Name=='{#PSU.NAME}')].LineInputVoltage.first()
        master_item:
          key: redfish.power.get
        tags:
        - tag: Component
          value: PSU
      master_item:
        key: redfish.power.get
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var data = JSON.parse(value);\nvar out = [];\nfor (var i = 0; i < data.PowerSupplies.length;\
          \ i++) {\n  var p = data.PowerSupplies[i];\n  out.push({\n    '{#PSU.NAME}':\
          \ p.Name,\n    '{#PSU.CAPACITY}': p.PowerCapacityWatts\n  });\n}\nreturn\
          \ JSON.stringify(out);\n"
    - uuid: c2a61c01d56e4b29a5c7d6b756272fa1
