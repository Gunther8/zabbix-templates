          value: Drive
        trigger_prototypes:
        - uuid: d2ea7a2410f04eec98f6050fb91571df
          expression: last(/Template Lenovo SR660 V2 Redfish AMI/redfish.drive.health[{#DRIVE.NAME}])<>"OK"
          name: Drive [{#DRIVE.NAME}] health not OK on {HOST.NAME}
          priority: HIGH
      - uuid: 15ec1b87a2a243339cd2c37502b8719f
        name: 'Drive [{#DRIVE.NAME}]: SSD Life Left (%)'
        type: DEPENDENT
        key: redfish.drive.lifeleft[{#DRIVE.NAME}]
        delay: '0'
        units: '%'
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.Status.LeftTime
          error_handler: DISCARD_VALUE
        master_item:
          key: redfish.drive.get[{#DRIVE.NAME}]
        tags:
        - tag: Component
          value: Drive
        trigger_prototypes:
        - uuid: d40bd8884a6a4593b37ae22e306ff6b5
          expression: last(/Template Lenovo SR660 V2 Redfish AMI/redfish.drive.lifeleft[{#DRIVE.NAME}])<{$SSD.LEFTTIME.WARN}
          name: Drive [{#DRIVE.NAME}] SSD life remaining below {$SSD.LEFTTIME.WARN}%
            on {HOST.NAME}
          priority: WARNING
      - uuid: 2252c33d443b457e89c1d1df684f7d01
        name: 'Drive [{#DRIVE.NAME}]: Temperature'
        type: DEPENDENT
        key: redfish.drive.temp[{#DRIVE.NAME}]
        delay: '0'
        history: 7d
        trends: 90d
        value_type: FLOAT
        units: C
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.Temperature
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        master_item:
          key: redfish.drive.get[{#DRIVE.NAME}]
        tags:
        - tag: Component
          value: Drive
      master_item:
        key: redfish.chassis.get
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var data = JSON.parse(value);\nvar out = [];\nvar drives = (data.Links\
          \ && data.Links.Drives) ? data.Links.Drives : [];\nfor (var i = 0; i < drives.length;\
          \ i++) {\n  var id = drives[i]['@odata.id'];\n  var name = id.split('/').pop();\n\
          \  out.push({\n    '{#DRIVE.NAME}': name,\n    '{#DRIVE.URL}': id\n  });\n\
          }\nreturn JSON.stringify(out);\n"
    - uuid: 6e54a872bcfb42a594c0fb7ce8b23059
      name: Fan discovery
      type: DEPENDENT
      key: redfish.fan.discovery
      delay: '0'
      lifetime: 7d
      item_prototypes:
      - uuid: 7c90934b5c0c4f63ae8a2dbe6b1a4334
        name: 'Fan [{#FAN.NAME}]: Speed'
        type: DEPENDENT
        key: redfish.fan.speed[{#FAN.NAME}]
        delay: '0'
        history: 7d
        trends: 90d
        units: RPM
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.Fans[?(@.Name=='{#FAN.NAME}')].Reading.first()
        master_item:
          key: redfish.thermal.get
        tags:
        - tag: Component
          value: Fan
        trigger_prototypes:
        - uuid: 562e0a9c88df4deab1579a8ca15feb4a
          expression: last(/Template Lenovo SR660 V2 Redfish AMI/redfish.fan.speed[{#FAN.NAME}])<{#FAN.LOWERCRIT}
          name: Fan [{#FAN.NAME}] speed below critical threshold on {HOST.NAME}
          priority: HIGH
        - uuid: e2f4cb65d31e425e81b2c0f45ef6e159
          expression: last(/Template Lenovo SR660 V2 Redfish AMI/redfish.fan.speed[{#FAN.NAME}])<{#FAN.LOWERWARN}
          name: Fan [{#FAN.NAME}] speed below warning threshold on {HOST.NAME}
          priority: WARNING
          dependencies:
          - name: Fan [{#FAN.NAME}] speed below critical threshold on {HOST.NAME}
            expression: last(/Template Lenovo SR660 V2 Redfish AMI/redfish.fan.speed[{#FAN.NAME}])<{#FAN.LOWERCRIT}
      - uuid: 07e3e32c0b2c4a7e9b81c1e954778eff
        name: 'Fan [{#FAN.NAME}]: Status'
        type: DEPENDENT
        key: redfish.fan.status[{#FAN.NAME}]
        delay: '0'
        history: 7d
        trends: '0'
        value_type: TEXT
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.Fans[?(@.Name=='{#FAN.NAME}')].Status.Health.first()
        master_item:
          key: redfish.thermal.get
        tags:
        - tag: Component
          value: Fan
        trigger_prototypes:
        - uuid: b99e069013ac47d8a2a27f2187156791
          expression: last(/Template Lenovo SR660 V2 Redfish AMI/redfish.fan.status[{#FAN.NAME}])<>"OK"
          name: Fan [{#FAN.NAME}] health not OK on {HOST.NAME}
          priority: HIGH
      master_item:
        key: redfish.thermal.get
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var data = JSON.parse(value);\nvar out = [];\nfor (var i = 0; i < data.Fans.length;\
          \ i++) {\n  var f = data.Fans[i];\n  if (f.ReadingUnits !== 'RPM') continue;\n\
          \  if (f.Status && f.Status.State === 'Absent') continue;\n  out.push({\n\
          \    '{#FAN.NAME}': f.Name,\n    '{#FAN.LOWERCRIT}': (f.LowerThresholdCritical\
          \ !== undefined ? f.LowerThresholdCritical : '{$FAN.MIN.RPM}'),\n    '{#FAN.LOWERWARN}':\
          \ (f.LowerThresholdNonCritical !== undefined ? f.LowerThresholdNonCritical\
          \ : '{$FAN.MIN.RPM}')\n  });\n}\nreturn JSON.stringify(out);\n"
    - uuid: 13d0c44daf334b42acd8c765cb525c2f
      name: Power supply discovery
      type: DEPENDENT
      key: redfish.psu.discovery
      delay: '0'
      lifetime: 7d
      item_prototypes:
      - uuid: a03802dc5c0c40d68be186e012a0cc94
