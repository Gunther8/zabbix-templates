          name: Temperature [{#TEMP.NAME}] above warning threshold on {HOST.NAME}
          priority: WARNING
          dependencies:
          - name: Temperature [{#TEMP.NAME}] above critical threshold on {HOST.NAME}
            expression: last(/Template Lenovo SR660 V2 Redfish AMI/redfish.temp.reading[{#TEMP.NAME}])>{#TEMP.UPPERCRIT}
      master_item:
        key: redfish.thermal.get
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var data = JSON.parse(value);\nvar out = [];\nfor (var i = 0; i < data.Temperatures.length;\
          \ i++) {\n  var t = data.Temperatures[i];\n  if (t.Status && t.Status.State\
          \ === 'Absent') continue;\n  out.push({\n    '{#TEMP.NAME}': t.Name,\n \
          \   '{#TEMP.UPPERCRIT}': (t.UpperThresholdCritical !== undefined ? t.UpperThresholdCritical\
          \ : ''),\n    '{#TEMP.UPPERWARN}': (t.UpperThresholdNonCritical !== undefined\
          \ ? t.UpperThresholdNonCritical : '')\n  });\n}\nreturn JSON.stringify(out);\n"
    macros:
    - macro: '{$FAN.MIN.RPM}'
      value: '500'
      description: Fallback lower threshold for fan RPM if device does not report
        LowerThresholdCritical
    - macro: '{$REDFISH.PASSWORD}'
      type: SECRET_TEXT
      description: Redfish/BMC login password
    - macro: '{$REDFISH.SCHEME}'
      value: https
      description: http or https
    - macro: '{$REDFISH.USER}'
      value: gang
      description: Redfish/BMC login username
    - macro: '{$SSD.LEFTTIME.WARN}'
      value: '10'
      description: SSD remaining life (%) warning threshold
