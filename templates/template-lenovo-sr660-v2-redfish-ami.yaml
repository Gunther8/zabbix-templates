        type: DEPENDENT
        key: redfish.psu.output[{#PSU.NAME}]
        delay: '0'
        history: 7d
        trends: 90d
        units: W
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.PowerSupplies[?(@.Name=='{#PSU.NAME}')].PowerOutputWatts.first()
        master_item:
