    discovery_rules:
    - uuid: 11ab13f61fcc467fb314871f732c042c
      name: Physical drive discovery
      type: DEPENDENT
      key: redfish.drive.discovery
      delay: '0'
      lifetime: 7d
      item_prototypes:
      - uuid: 788f8c9e877d4e2ba3002dd61862b1ff
        name: 'Drive [{#DRIVE.NAME}]: Failure Predicted'
        type: DEPENDENT
        key: redfish.drive.failurepredicted[{#DRIVE.NAME}]
        delay: '0'
        history: 30d
        trends: '0'
        value_type: TEXT
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.FailurePredicted
        master_item:
          key: redfish.drive.get[{#DRIVE.NAME}]
        tags:
        - tag: Component
          value: Drive
        trigger_prototypes:
        - uuid: 49aa18f732874ea3856faece76d23ece
          expression: last(/Template Lenovo SR660 V2 Redfish AMI/redfish.drive.failurepredicted[{#DRIVE.NAME}])="true"
          name: Drive [{#DRIVE.NAME}] failure predicted (SMART) on {HOST.NAME}
          priority: HIGH
      - uuid: 7b06769225104bb8b5ff07fe4be74b14
        name: 'Drive [{#DRIVE.NAME}]: Raw data'
        type: HTTP_AGENT
        key: redfish.drive.get[{#DRIVE.NAME}]
        delay: 10m
        history: 3d
        trends: '0'
        value_type: TEXT
        authtype: BASIC
        username: '{$REDFISH.USER}'
        password: '{$REDFISH.PASSWORD}'
        timeout: 15s
        url: '{$REDFISH.SCHEME}://{HOST.CONN}{#DRIVE.URL}'
        tags:
        - tag: Component
          value: Drive
      - uuid: ee094d9b2851489cb23447443f5acae3
        name: 'Drive [{#DRIVE.NAME}]: Health'
        type: DEPENDENT
        key: redfish.drive.health[{#DRIVE.NAME}]
        delay: '0'
        history: 30d
        trends: '0'
        value_type: TEXT
        preprocessing:
