  - uuid: b1a12f811d914406b56c0b0ed85a29e2
    template: Template Lenovo SR660 V2 Redfish AMI
    name: Template Lenovo SR660 V2 Redfish AMI
    description: 'Lenovo ThinkServer SR660 V2 (AMI-based XCC) Redfish monitoring template.

      Built and validated against BMC firmware 6.a2.00 / RedfishVersion 1.8.0.

      Covers: System health rollup, Chassis (incl. intrusion sensor), BMC/Manager
      health,

      Fans, Temperatures, Power Supplies, RAID Storage Controllers, Physical Drives.

      Requires Zabbix 6.0+. Uses HTTP agent items (no external scripts, no agent install
      on host).

      Macros to configure per host: {$REDFISH.USER}, {$REDFISH.PASSWORD}, {$REDFISH.SCHEME}

      '
    groups:
    - name: Templates/Lenovo
    items:
    - uuid: db80d557760e49cea439b7628474a5a1
      name: 'BMC: Firmware Version'
      type: DEPENDENT
      key: redfish.bmc.firmware
      delay: '0'
      trends: '0'
      value_type: TEXT
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.FirmwareVersion
      master_item:
        key: redfish.manager.get
      tags:
      - tag: Component
        value: BMC
      triggers:
      - uuid: 3b26da3f84144160b401df090f64e645
        expression: last(/Template Lenovo SR660 V2 Redfish AMI/redfish.bmc.firmware,#1)<>last(/Template
          Lenovo SR660 V2 Redfish AMI/redfish.bmc.firmware,#2)
        name: BMC firmware version changed on {HOST.NAME}
        priority: INFO
    - uuid: 529560b982c94fbd98578682c533af63
