  - uuid: d999a25842ca452b8eb319f9fe18d49f
    template: Template ODA X11 iLOM REST API - System Health
    name: Template ODA X11 iLOM REST API - System Health
    description: 'Oracle ODA X11 iLOM system/power/memory/storage/networking/CPU health

      via Oracle''s proprietary ILOM Web Service REST API (/rest/v1/, NOT

      DMTF Redfish). Auth: HTTP Basic with a dedicated read-only ILOM user.

      Companion template to "Template ODA X11 iLOM REST API - Cooling"

      (fans + inlet/exhaust temperature) - link both to the same host.

      Mirrors the coverage of the existing oda_check.py ILOM-CLI inspection

      script (System/CPU/Memory/Power/Storage/Networking/Open_Problems/SP)

      but as continuously-polled Zabbix items with alerting, instead of a

      once-daily HTML report.

      Data source verified 2026-07-08 against ODA X11 HA node 10.1.251.204

      (ILOM 5.1.4.23, model ORACLE SERVER E6-2L).

      Most valuable single item: ilom.openproblems.count - mirrors ILOM''s

      own aggregated fault detection (same source as "Open Problems" shown

      in the ILOM web UI and in oda_check.py''s cmd_open_problems).

      '
    groups:
    - name: Templates/Hardware
    items:
    - uuid: c729b8c3c92a477aae14a44104282fab
      name: CPU 0 health
      type: DEPENDENT
      key: ilom.cpu.health[0]
      delay: '0'
      history: 30d
      trends: '0'
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.Collection[?(@.Target=='/rest/v1/System/Processors/CPUs/CPU_0')].health.first()
      master_item:
        key: ilom.cpus.raw
      tags:
      - tag: component
        value: cpu
      triggers:
      - uuid: 34598135e1c9431cacd030cdd7b1fc48
        expression: find(/Template ODA X11 iLOM REST API - System Health/ilom.cpu.health[0],,"ne","OK")=1
