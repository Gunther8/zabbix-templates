    - uuid: 60959e014be648ff99a39ea3dd795f84
      name: 'V5030: Nodes discovery'
      type: DEPENDENT
      key: v5030.nodes.discovery
      delay: '0'
      item_prototypes:
      - uuid: 77a8da7772b64a359d29f34878034c68
        name: 'V5030 Node {#NODENAME}: Status'
        type: DEPENDENT
        key: v5030.node.status[{#NODEID}]
        delay: '0'
        history: 7d
