            expression: last(/Lenovo IBM V5030 REST API/v5030.pool.capacity_used_pct[{#POOLID}])>{$V5030.CAPACITY.CRIT}
      - uuid: 86960f292ea7468db9870c375256d848
        name: 'V5030 Pool {#POOLNAME}: Status'
