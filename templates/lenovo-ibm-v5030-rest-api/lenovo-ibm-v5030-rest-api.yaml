          \ pools[i].name\n    });\n}\nreturn JSON.stringify(result);\n"
    macros:
    - macro: '{$V5030.CAPACITY.CRIT}'
      value: '90'
      description: 容量使用率严重阈值(%)
    - macro: '{$V5030.CAPACITY.WARN}'
      value: '80'
      description: 容量使用率告警阈值(%)
    - macro: '{$V5030.PASSWORD}'
      type: SECRET_TEXT
    - macro: '{$V5030.URL}'
      value: https://192.0.2.10:7443
    - macro: '{$V5030.USER}'
