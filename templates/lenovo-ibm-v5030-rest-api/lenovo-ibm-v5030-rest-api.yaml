      type: DEPENDENT
      key: v5030.drives.discovery
      delay: '0'
      item_prototypes:
      - uuid: ccfee17a7b3f4142bc513cdf985784e4
        name: 'V5030 Drive {#DRIVEID} (slot {#SLOTID}, {#DRIVEUSE}): Status'
        type: DEPENDENT
        key: v5030.drive.status[{#DRIVEID}]
        delay: '0'
        history: 7d
        trends: '0'
        value_type: CHAR
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.drives[?(@.id=='{#DRIVEID}')].status
        - type: JAVASCRIPT
          parameters:
          - 'var v = JSON.parse(value);

            return Array.isArray(v) ? v[0] : v;

            '
        master_item:
          key: v5030.collect
        tags:
        - tag: component
          value: storage
        trigger_prototypes:
        - uuid: 6de49b7b16da4ea1aa1e4a730830b613
          expression: last(/Lenovo IBM V5030 REST API/v5030.drive.status[{#DRIVEID}])<>"online"
          name: 'V5030 Drive {#DRIVEID} (slot {#SLOTID}): status is not online'
          priority: AVERAGE
      master_item:
        key: v5030.collect
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "// lsdrive 没有 name 字段, 用 id + slot_id 拼显示名\nvar drives = JSON.parse(value).drives;\n\
          var result = [];\nif (!Array.isArray(drives)) return JSON.stringify(result);\n\
          for (var i = 0; i < drives.length; i++) {\n    result.push({\n        '{#DRIVEID}':\
          \ drives[i].id,\n        '{#SLOTID}': drives[i].slot_id,\n        '{#ENCLOSUREID}':\
          \ drives[i].enclosure_id,\n        '{#DRIVEUSE}': drives[i].use\n    });\n\
          }\nreturn JSON.stringify(result);\n"
    - uuid: 32f8201329b746b8b588b3acb1241271
