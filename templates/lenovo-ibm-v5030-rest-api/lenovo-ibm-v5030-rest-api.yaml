          name: 'V5030 Pool {#POOLNAME}: capacity usage critical (>{$V5030.CAPACITY.CRIT}%)'
          priority: HIGH
        - uuid: fa68d62002e3401b922d3133c383ef33
          expression: last(/Lenovo IBM V5030 REST API/v5030.pool.capacity_used_pct[{#POOLID}])>{$V5030.CAPACITY.WARN}
          name: 'V5030 Pool {#POOLNAME}: capacity usage high (>{$V5030.CAPACITY.WARN}%)'
          priority: WARNING
