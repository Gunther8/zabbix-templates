          }\nreturn JSON.stringify(result);\n"
    - uuid: 52db7038389b45da83a47731c54025c2
      name: 'V5030: Pools discovery'
      type: DEPENDENT
      key: v5030.pools.discovery
      delay: '0'
      item_prototypes:
      - uuid: 1a65bc3f0e5747649efbdeec554f0a9a
        name: 'V5030 Pool {#POOLNAME}: Capacity used (%)'
        type: DEPENDENT
        key: v5030.pool.capacity_used_pct[{#POOLID}]
        delay: '0'
        history: 7d
        value_type: FLOAT
        units: '%'
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - "function toBytes(raw) {\n    if (!raw) return 0;\n    var m = String(raw).match(/([\\\
            d.]+)\\s*([KMGTP]?B)/i);\n    if (!m) return 0;\n    var num = parseFloat(m[1]);\n\
            \    var unit = m[2].toUpperCase();\n    var mult = {B:1, KB:1024, MB:1024*1024,\
            \ GB:1024*1024*1024,\n                TB:1024*1024*1024*1024, PB:1024*1024*1024*1024*1024};\n\
            \    return num * (mult[unit] || 1);\n}\nvar pools = JSON.parse(value).pools;\n\
            var p = null;\nfor (var i = 0; i < pools.length; i++) {\n    if (pools[i].id\
            \ === '{#POOLID}') { p = pools[i]; break; }\n}\nif (!p) throw 'pool {#POOLID}\
            \ not found in response';\nvar total = toBytes(p.capacity);\nvar free\
            \  = toBytes(p.free_capacity);\nif (total <= 0) return 0;\nreturn Math.round(((total\
            \ - free) / total) * 10000) / 100;\n"
        master_item:
