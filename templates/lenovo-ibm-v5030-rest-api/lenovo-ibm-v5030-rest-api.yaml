      - type: JAVASCRIPT
        parameters:
        - "var mdisks = JSON.parse(value).mdisks;\nvar result = [];\nif (!Array.isArray(mdisks))\
          \ return JSON.stringify(result);\nfor (var i = 0; i < mdisks.length; i++)\
          \ {\n    result.push({\n        '{#MDISKID}': mdisks[i].id,\n        '{#MDISKNAME}':\
