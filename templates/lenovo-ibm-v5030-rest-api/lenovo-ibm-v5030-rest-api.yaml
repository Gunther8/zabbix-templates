zabbix_export:
  version: '6.0'
  date: '2026-07-12T04:11:58Z'
  groups:
  - uuid: 1728cbc109e9406181e03620b8d084ab
    name: Templates/Lenovo
  - uuid: 0835b2a34e4a43d6887f5887b0135acc
    name: Templates/Servers Hardware
  - uuid: c85c995bd8c447efaaa9ece4d12c299c
    name: Templates/Storage
  templates:
  - uuid: 4420c8cfcc294bc1b4a41305284a03b1
    template: Lenovo IBM V5030 REST API
    name: Lenovo IBM V5030 REST API
    description: "通过 Script Item 调用 V5030 (Spectrum Virtualize) REST API 采集状态。\n需要在\
      \ Host 层面设置以下宏:\n  {$V5030.URL}      例如 https://192.0.2.10:7443\n  {$V5030.USER}\
      \     REST API 用户名(建议 Monitor 权限只读账号)\n  {$V5030.PASSWORD} REST API 密码(Secret\
      \ text 类型)\n"
    groups:
    - name: Templates/Storage
    items:
    - uuid: 825e5dfebc4942d68a4bdf42dbc7bbfd
      name: 'V5030: Collect data (REST API)'
      type: SCRIPT
      key: v5030.collect
      delay: 5m
      history: 7d
      trends: '0'
      value_type: TEXT
      params: "var baseUrl = '{$V5030.URL}';\nvar user    = '{$V5030.USER}';\nvar\
        \ pass    = '{$V5030.PASSWORD}';\n\nfunction callApi(path, token) {\n    var\
        \ req = new HttpRequest();\n    req.addHeader('Content-Type: application/json');\n\
        \    if (token) {\n        req.addHeader('X-Auth-Token: ' + token);\n    }\
        \ else {\n        req.addHeader('X-Auth-Username: ' + user);\n        req.addHeader('X-Auth-Password:\
        \ ' + pass);\n    }\n    var resp = req.post(baseUrl + path, '{}');\n    var\
        \ code = req.getStatus();\n    if (code < 200 || code >= 300) {\n        throw\
        \ path + ' HTTP ' + code + ' body=' + resp;\n    }\n    try {\n        return\
        \ JSON.parse(resp);\n    } catch (e) {\n        throw path + ' response is\
        \ not valid JSON: ' + resp;\n    }\n}\n\ntry {\n    var auth = callApi('/rest/auth',\
        \ null);\n    if (!auth || !auth.token) {\n        throw 'No token in auth\
        \ response: ' + JSON.stringify(auth);\n    }\n    var token = auth.token;\n\
        \n    var result = {};\n    result.system     = callApi('/rest/lssystem',\
        \ token);\n    result.nodes      = callApi('/rest/lsnode', token);\n    result.mdisks\
        \     = callApi('/rest/lsmdisk', token);\n    result.drives     = callApi('/rest/lsdrive',\
        \ token);\n    result.enclosures = callApi('/rest/lsenclosure', token);\n\
        \    result.pools      = callApi('/rest/lsmdiskgrp', token);\n\n    return\
        \ JSON.stringify(result);\n} catch (e) {\n    throw 'V5030 collect failed:\
        \ ' + e;\n}\n"
      timeout: 30s
      tags:
      - tag: component
        value: storage
    - uuid: e6185c6e3ee8426ab511ebf63a983d25
      name: 'V5030: Drives faulty/degraded'
      type: DEPENDENT
      key: v5030.drives.faulty_count
      delay: '0'
      history: 7d
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var d = JSON.parse(value).drives;\nif (!Array.isArray(d)) return 0;\nvar\
          \ count = 0;\nfor (var i = 0; i < d.length; i++) {\n    var s = String(d[i].status).toLowerCase();\n\
          \    if (s === 'offline' || s === 'degraded' || s === 'faulty') count++;\n\
          }\nreturn count;\n"
      master_item:
        key: v5030.collect
      tags:
      - tag: component
        value: storage
      triggers:
      - uuid: 7d0f73532bfb4ed1acef9c9fe303f1c8
        expression: last(/Lenovo IBM V5030 REST API/v5030.drives.faulty_count)>0
        name: 'V5030: One or more drives are faulty/degraded'
        priority: AVERAGE
    - uuid: 5352478d81534e988ab8d6e90e81da9e
      name: 'V5030: Enclosures with fault'
      type: DEPENDENT
      key: v5030.enclosures.fault_count
      delay: '0'
      history: 7d
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var e = JSON.parse(value).enclosures;\nif (!Array.isArray(e)) return 0;\n\
          var count = 0;\nfor (var i = 0; i < e.length; i++) {\n    var s = String(e[i].status).toLowerCase();\n\
          \    if (s !== 'online') count++;\n}\nreturn count;\n"
      master_item:
        key: v5030.collect
      tags:
      - tag: component
        value: storage
      triggers:
      - uuid: 4e6a5652c1be4bf682c3dcacd2600d87
        expression: last(/Lenovo IBM V5030 REST API/v5030.enclosures.fault_count)>0
        name: 'V5030: Enclosure fault detected'
        priority: HIGH
    - uuid: 9f1c1fe298c24afea9eb48e0f5a8af59
      name: 'V5030: MDisks offline/degraded'
      type: DEPENDENT
      key: v5030.mdisks.offline_count
      delay: '0'
      history: 7d
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var m = JSON.parse(value).mdisks;\nif (!Array.isArray(m)) return 0;\nvar\
          \ count = 0;\nfor (var i = 0; i < m.length; i++) {\n    var s = String(m[i].status).toLowerCase();\n\
          \    if (s !== 'online') count++;\n}\nreturn count;\n"
      master_item:
        key: v5030.collect
      tags:
      - tag: component
        value: storage
      triggers:
      - uuid: bba0d1f02e7f46b0a7362e20ce8765b9
        expression: last(/Lenovo IBM V5030 REST API/v5030.mdisks.offline_count)>0
        name: 'V5030: One or more MDisks are offline/degraded'
        priority: HIGH
    - uuid: f8eff0a48a96412fb9898be18c31ddca
      name: 'V5030: Nodes offline'
      type: DEPENDENT
      key: v5030.nodes.offline_count
      delay: '0'
      history: 7d
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var n = JSON.parse(value).nodes;\nif (!Array.isArray(n)) return 0;\nvar\
          \ count = 0;\nfor (var i = 0; i < n.length; i++) {\n    if (String(n[i].status).toLowerCase()\
          \ !== 'online') count++;\n}\nreturn count;\n"
      master_item:
        key: v5030.collect
      tags:
      - tag: component
        value: storage
      triggers:
      - uuid: 98d8b67219924186bda74478f3afba4e
        expression: last(/Lenovo IBM V5030 REST API/v5030.nodes.offline_count)>0
        name: 'V5030: One or more nodes are not online'
        priority: HIGH
    - uuid: 39e2168d54bf440c985127b1025f63b0
      name: 'V5030: Nodes total'
      type: DEPENDENT
      key: v5030.nodes.total
      delay: '0'
      history: 7d
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'var n = JSON.parse(value).nodes;

          return Array.isArray(n) ? n.length : 0;

          '
      master_item:
        key: v5030.collect
      tags:
      - tag: component
        value: storage
    - uuid: a713971d87934c5ba2bec312e2005d49
      name: 'V5030: Capacity used (%)'
      type: DEPENDENT
      key: v5030.system.capacity_used_pct
      delay: '0'
      history: 7d
      value_type: FLOAT
      units: '%'
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "function toBytes(raw) {\n    if (!raw) return 0;\n    var m = String(raw).match(/([\\\
          d.]+)\\s*([KMGTP]?B)/i);\n    if (!m) return 0;\n    var num = parseFloat(m[1]);\n\
          \    var unit = m[2].toUpperCase();\n    var mult = {B:1, KB:1024, MB:1024*1024,\
          \ GB:1024*1024*1024,\n                TB:1024*1024*1024*1024, PB:1024*1024*1024*1024*1024};\n\
          \    return num * (mult[unit] || 1);\n}\nvar d = JSON.parse(value).system;\n\
          var total = toBytes(d.total_mdisk_capacity || d.total_capacity);\nvar free\
          \  = toBytes(d.total_free_space);\nif (total <= 0) return 0;\nreturn Math.round(((total\
          \ - free) / total) * 10000) / 100;\n"
      master_item:
        key: v5030.collect
      tags:
      - tag: component
        value: storage
      triggers:
      - uuid: 32b8ecc0c77248b4b913afcdcb6ecac5
        expression: last(/Lenovo IBM V5030 REST API/v5030.system.capacity_used_pct)>{$V5030.CAPACITY.CRIT}
        name: 'V5030: Storage capacity usage critical (>{$V5030.CAPACITY.CRIT}%)'
        priority: HIGH
      - uuid: c2a1f0b3e9d84f3a9d2f7b1c6e5a8d4b
        expression: last(/Lenovo IBM V5030 REST API/v5030.system.capacity_used_pct)>{$V5030.CAPACITY.WARN}
        name: 'V5030: Storage capacity usage high (>{$V5030.CAPACITY.WARN}%)'
        priority: WARNING
        dependencies:
        - name: 'V5030: Storage capacity usage critical (>{$V5030.CAPACITY.CRIT}%)'
          expression: last(/Lenovo IBM V5030 REST API/v5030.system.capacity_used_pct)>{$V5030.CAPACITY.CRIT}
    - uuid: 7f7f210d63c343dca23f9e953f00cd68
      name: 'V5030: Firmware / code level'
      type: DEPENDENT
      key: v5030.system.code_level
      delay: '0'
      history: 7d
      trends: '0'
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.system.code_level
      master_item:
        key: v5030.collect
      tags:
      - tag: component
        value: storage
    - uuid: fe4b26ce60de4d9585e2a8fbd270bcd2
      name: 'V5030: Free capacity (bytes)'
      type: DEPENDENT
      key: v5030.system.free_capacity
      delay: '0'
      history: 7d
      units: B
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var d = JSON.parse(value).system;\nvar raw = d.total_free_space || d.free_capacity\
          \ || '0';\nvar m = String(raw).match(/([\\d.]+)\\s*([KMGTP]?B)/i);\nif (!m)\
          \ { return 0; }\nvar num = parseFloat(m[1]);\nvar unit = m[2].toUpperCase();\n\
          var mult = {B:1, KB:1024, MB:1024*1024, GB:1024*1024*1024,\n           \
          \ TB:1024*1024*1024*1024, PB:1024*1024*1024*1024*1024};\nreturn Math.round(num\
          \ * (mult[unit] || 1));\n"
      master_item:
        key: v5030.collect
      tags:
      - tag: component
        value: storage
    - uuid: 238f6e433ebd4f778ab27383907a39a5
      name: 'V5030: System name'
      type: DEPENDENT
      key: v5030.system.name
      delay: '0'
      history: 7d
      trends: '0'
      value_type: CHAR
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.system.name
      master_item:
        key: v5030.collect
      tags:
      - tag: component
        value: storage
    - uuid: 35527933a3704016a284654195a1ed89
      name: 'V5030: Total capacity (bytes)'
      type: DEPENDENT
      key: v5030.system.total_capacity
      delay: '0'
      history: 7d
      units: B
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "// lssystem 里容量字段通常是带单位的字符串, 例如 \"10.00TB\"\n// 不同固件字段名略有差异, 这里做几个候选字段的兼容处理\n\
          var d = JSON.parse(value).system;\nvar raw = d.total_mdisk_capacity || d.total_capacity\
          \ || d.capacity || '0';\nvar m = String(raw).match(/([\\d.]+)\\s*([KMGTP]?B)/i);\n\
          if (!m) { return 0; }\nvar num = parseFloat(m[1]);\nvar unit = m[2].toUpperCase();\n\
          var mult = {B:1, KB:1024, MB:1024*1024, GB:1024*1024*1024,\n           \
          \ TB:1024*1024*1024*1024, PB:1024*1024*1024*1024*1024};\nreturn Math.round(num\
          \ * (mult[unit] || 1));\n"
      master_item:
        key: v5030.collect
      tags:
      - tag: component
        value: storage
    discovery_rules:
    - uuid: 7f9cfad0fdcc4bd38a9277caee52824c
