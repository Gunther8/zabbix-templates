  templates:
  - uuid: 6c2534a531744910938a4d2b573600b7
    template: Template Server Lenovo XCC SNMPv3
    name: Template Server Lenovo XCC SNMPv3
    templates:
    - name: Template Module Generic SNMPv3
    groups:
    - name: Templates/Servers Hardware
    items:
    - uuid: cb1d5e9f271e4fca9eae3e0f1ed5e0d7
      name: currentSysPowerStatus
